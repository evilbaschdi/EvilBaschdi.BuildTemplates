parameters:
  - name: "projects"
    type: object
    default: []
  - name: "framework"
    type: string
    values:
      - net8.0
      - net8.0-windows
      - net9.0
      - net9.0-windows
      - net10.0
      - net10.0-windows
  - name: "projectsParentDirectory"
    type: string
  - name: "testsParentDirectory"
    type: string

jobs:
  - job: BuildNPack
    pool:
      name: x-agentpool
    workspace:
      clean: all
    variables:
      buildPlatform: "Any CPU"
      buildConfiguration: "Release"

    steps:
      - task: UseDotNet@2
        displayName: "Use .Net Core sdk from global.json"
        inputs:
          packageType: "sdk"
          useGlobalJson: true
          includePreviewVersions: true

      - ${{ each project in parameters.projects }}:
          - task: DotNetCoreCLI@2
            displayName: "dotnet restore ${{ project }}"
            inputs:
              command: restore
              projects: ${{ parameters.projectsParentDirectory }}${{ project }}/${{ project }}.csproj
              feedsToUse: config
              nugetConfigPath: NuGet.config

          - task: DotNetCoreCLI@2
            displayName: "dotnet build ${{ project }}"
            inputs:
              projects: ${{ parameters.projectsParentDirectory }}${{ project }}/${{ project }}.csproj
              arguments: "--configuration $(BuildConfiguration)"

          - task: DotNetCoreCLI@2
            displayName: "dotnet test ${{ project }}"
            inputs:
              command: test
              projects: ${{ parameters.testsParentDirectory }}${{ project }}.Tests/${{ project }}.Tests.csproj
              arguments: >
                --configuration $(BuildConfiguration)
                --framework ${{ parameters.framework }}
                -p:TestingPlatformDotnetTestSupport=true
              #  -p:TestingPlatformCommandLineArguments="--report-trx --report-trx-filename ${{ project }}.trx --results-directory $(Agent.TempDirectory)/TestResults --coverage --coverage-output-format cobertura --coverage-output ${{ project }}.cobertura.xml"
              publishTestResults: false
            continueOnError: true

          # - task: PublishTestResults@2
          #   displayName: "publish test results"
          #   inputs:
          #     testResultsFormat: "VSTest"
          #     testResultsFiles: "$(Agent.TempDirectory)/TestResults/${{ project }}.trx"
          #     mergeTestResults: true
          #     failTaskOnFailedTests: false

          - task: DotNetCoreCLI@2
            displayName: "dotnet custom pack release"
            inputs:
              command: custom
              projects: ${{ parameters.projectsParentDirectory }}${{ project }}/${{ project }}.csproj
              custom: pack
              arguments: "-c $(BuildConfiguration) -o $(Build.ArtifactStagingDirectory) --no-build"
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

          - task: DotNetCoreCLI@2
            displayName: "dotnet custom pack preview"
            inputs:
              command: custom
              projects: ${{ parameters.projectsParentDirectory }}${{ project }}/${{ project }}.csproj
              custom: pack
              arguments: "-c $(BuildConfiguration) -o $(Build.ArtifactStagingDirectory) --no-build --version-suffix $(Build.SourceBranchName)"
            condition: and(succeeded(), ne(variables['Build.SourceBranch'], 'refs/heads/main'))

      # - task: reportgenerator@5
      #   displayName: "publish code coverage results"
      #   inputs:
      #     reports: "$(Agent.TempDirectory)/TestResults/*.cobertura.xml"
      #     targetdir: "$(Agent.TempDirectory)/CoverageReport"
      #     reporttypes: "HtmlInline_AzurePipelines;Cobertura"
      #     publishCodeCoverageResults: true
      #   continueOnError: true

      - task: PublishBuildArtifacts@1
        displayName: "publish build artifacts"
        inputs:
          ArtifactName: "$(Build.SourceBranchName)"
        condition: succeededOrFailed()
