jobs:
  - job: DeepCleanupAllAgents
    displayName: "Deep Cleanup"
    pool:
      name: x-agentpool
    steps:
      - task: Bash@3
        displayName: "Systemübergreifende Reinigung"
        continueOnError: true
        inputs:
          targetType: inline
          script: |
            # 1. Pfad-Korrektur NUR für Windows
            # Wenn wir auf Windows sind, bevorzugen wir Git-Bash vor der System-Bash
            if [[ "$AGENT_OS" == "Windows_NT" ]]; then
                export PATH="/c/Program Files/Git/bin:$PATH"
                echo "Windows erkannt, Git-Bash Pfad priorisiert."
            fi

            echo "Agent Name: $(Agent.Name)"
            echo "Nutze Shell: $(which bash)"

            WORK_DIR="$(Agent.WorkFolder)"
            TOOL_DIR="$WORK_DIR/_tool"

            # 2. Reinigung der nummerierten Ordner
            if [ -d "$WORK_DIR" ]; then
                echo "Bereinige $WORK_DIR..."
                find "$WORK_DIR" -maxdepth 1 -type d -regex ".*/[0-9]+" -exec rm -rf {} + 2>/dev/null
            fi

            # 3. .NET SDK Cache
            if [ -d "$TOOL_DIR/dotnet" ]; then
                rm -rf "$TOOL_DIR/dotnet"/* 2>/dev/null
            fi

            # 4. NuGet Cache
            # $HOME zeigt in der Git-Bash (Windows) und unter Linux jeweils korrekt 
            # auf das Benutzerverzeichnis (~/.nuget/packages)
            NUGET_PATH="$HOME/.nuget/packages"
            
            if [ -d "$NUGET_PATH" ]; then
                echo "Bereinige NuGet in $NUGET_PATH"
                find "$NUGET_PATH" -type d -mtime +14 -exec rm -rf {} + 2>/dev/null
            fi
        env:
          AGENT_OS: $(Agent.OS)