jobs:
  - job: CleanAllAgents
    strategy:
      parallel: 5 # Anzahl deiner Agenten
    pool:
      name: x-agentpool
    steps:
    - bash: |
        echo "Cleaning work folder: $AGENT_WORKFOLDER"
        # Gehe in den Workfolder
        cd "$AGENT_WORKFOLDER"
        
        # Lösche alle nummerierten Ordner (1, 2, 3...), 
        # aber NICHT den aktuellen Ordner des laufenden Jobs
        # $AGENT_ID ist die ID des aktuellen Agenten-Slots
        
        for d in */; do
            dir=${d%/}
            # Prüfen, ob der Ordner eine Zahl ist (Build-Verzeichnisse)
            if [[ $dir =~ ^[0-9]+$ ]]; then
                # Sicherheitscheck: Nicht das Verzeichnis des aktuellen Jobs löschen
                # Azure DevOps nutzt für den aktuellen Job oft einen Unterordner, 
                # wir löschen hier alles, was wir "erwischen" können.
                # Laufende Prozesse verhindern das Löschen des aktiven Ordners automatisch.
                echo "Attempting to remove folder: $dir"
                rm -rf "$dir" 2>/dev/null || echo "Folder $dir is in use, skipping."
            fi
        done
      displayName: 'Universal Cleanup (Windows & Debian)'
      continueOnError: true